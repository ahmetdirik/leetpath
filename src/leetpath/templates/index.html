<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen flex items-center justify-center font-sans">
    <main class="text-center px-6 max-w-2xl">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-50 text-indigo-700 text-xs font-medium mb-6">
            <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></span>
            Coming soon
        </div>
        <h1 class="text-6xl font-bold text-slate-900 tracking-tight mb-4">
            {{ heading }}
        </h1>
        <p class="text-lg text-slate-600 leading-relaxed mb-8">
            {{ message }}
        </p>
        <div class="text-sm text-slate-400">
            Built solo in Istanbul · Summer 2026
        </div>
    </main>
</body>
</html>
